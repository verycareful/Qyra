<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" width="1280" height="520" role="img" aria-label="Qyra features">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#171228"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2138"/>
      <stop offset="100%" stop-color="#141a2c"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#3ee9d1"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="520" fill="url(#bg2)"/>

  <g font-family="Inter, Geist, system-ui, sans-serif" fill="#e7ecf7">
    <text x="64" y="64" font-size="28" font-weight="700">Everything Acrobat does. None of the cloud.</text>
    <text x="64" y="92" font-size="15" font-weight="400" fill="#8b94ad">Your files never leave the machine. Ever.</text>
  </g>

  <!-- Cards -->
  <g font-family="Inter, Geist, system-ui, sans-serif">
    <!-- Row 1 -->
    <g transform="translate(64,128)">
      <rect width="280" height="160" rx="14" fill="url(#card)" stroke="#2a3147"/>
      <circle cx="36" cy="40" r="20" fill="#7c5cff" opacity="0.2"/>
      <path d="M28 40 h16 M28 34 h16 M28 46 h10" stroke="#cdbfff" stroke-width="2" stroke-linecap="round"/>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#fff">Tabbed Viewer</text>
      <text x="24" y="90"  font-size="13" fill="#8b94ad">Multi-doc tabs, thumbnails,</text>
      <text x="24" y="108" font-size="13" fill="#8b94ad">search, outline, zoom, rotate.</text>
      <text x="24" y="138" font-size="12" fill="#3ee9d1">react-virtual · MuPDF render</text>
    </g>
    <g transform="translate(360,128)">
      <rect width="280" height="160" rx="14" fill="url(#card)" stroke="#2a3147"/>
      <circle cx="36" cy="40" r="20" fill="#3ee9d1" opacity="0.2"/>
      <path d="M26 50 q6 -20 14 -10 q4 6 10 -8" stroke="#a3f1e3" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#fff">Annotate</text>
      <text x="24" y="90"  font-size="13" fill="#8b94ad">Ink, highlight, notes, shapes,</text>
      <text x="24" y="108" font-size="13" fill="#8b94ad">stamps, forms, redaction.</text>
      <text x="24" y="138" font-size="12" fill="#3ee9d1">perfect-freehand · flatten</text>
    </g>
    <g transform="translate(656,128)">
      <rect width="280" height="160" rx="14" fill="url(#card)" stroke="#2a3147"/>
      <circle cx="36" cy="40" r="20" fill="#5eb1ff" opacity="0.2"/>
      <path d="M26 32 h20 M26 40 h20 M26 48 h12" stroke="#bfdcff" stroke-width="2" stroke-linecap="round"/>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#fff">Page Ops</text>
      <text x="24" y="90"  font-size="13" fill="#8b94ad">Merge, split, reorder, rotate,</text>
      <text x="24" y="108" font-size="13" fill="#8b94ad">crop, remove, page numbers.</text>
      <text x="24" y="138" font-size="12" fill="#3ee9d1">drag-and-drop reorder</text>
    </g>
    <g transform="translate(952,128)">
      <rect width="264" height="160" rx="14" fill="url(#card)" stroke="#2a3147"/>
      <circle cx="36" cy="40" r="20" fill="#7c5cff" opacity="0.2"/>
      <path d="M26 32 l10 12 l14 -18" stroke="#cdbfff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#fff">OCR</text>
      <text x="24" y="90"  font-size="13" fill="#8b94ad">Searchable text from scans,</text>
      <text x="24" y="108" font-size="13" fill="#8b94ad">fully offline.</text>
      <text x="24" y="138" font-size="12" fill="#3ee9d1">tesseract.js</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(64,312)">
      <rect width="280" height="160" rx="14" fill="url(#card)" stroke="#2a3147"/>
      <circle cx="36" cy="40" r="20" fill="#3ee9d1" opacity="0.2"/>
      <path d="M28 30 v20 M28 30 h16 M28 40 h12 M28 50 h16" stroke="#a3f1e3" stroke-width="2" stroke-linecap="round"/>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#fff">Convert</text>
      <text x="24" y="90"  font-size="13" fill="#8b94ad">PDF ↔ images, PDF → text,</text>
      <text x="24" y="108" font-size="13" fill="#8b94ad">PDF → Word (.docx).</text>
      <text x="24" y="138" font-size="12" fill="#3ee9d1">native MuPDF pipeline</text>
    </g>
    <g transform="translate(360,312)">
      <rect width="280" height="160" rx="14" fill="url(#card)" stroke="#2a3147"/>
      <circle cx="36" cy="40" r="20" fill="#5eb1ff" opacity="0.2"/>
      <path d="M28 34 v-4 a8 8 0 0 1 16 0 v4 M24 34 h24 v18 h-24 z" stroke="#bfdcff" stroke-width="2" fill="none"/>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#fff">Protect</text>
      <text x="24" y="90"  font-size="13" fill="#8b94ad">Encrypt, unlock, compress,</text>
      <text x="24" y="108" font-size="13" fill="#8b94ad">watermark, redact.</text>
      <text x="24" y="138" font-size="12" fill="#3ee9d1">AES-128/256</text>
    </g>
    <g transform="translate(656,312)">
      <rect width="280" height="160" rx="14" fill="url(#card)" stroke="#2a3147"/>
      <circle cx="36" cy="40" r="20" fill="#7c5cff" opacity="0.2"/>
      <path d="M22 36 l14 -6 l14 6 v12 l-14 6 l-14 -6 z" stroke="#cdbfff" stroke-width="2" fill="none"/>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#fff">Native Speed</text>
      <text x="24" y="90"  font-size="13" fill="#8b94ad">Rust backend, MuPDF core,</text>
      <text x="24" y="108" font-size="13" fill="#8b94ad">Tauri shell. Small binary.</text>
      <text x="24" y="138" font-size="12" fill="#3ee9d1">~15MB installer</text>
    </g>
    <g transform="translate(952,312)">
      <rect width="264" height="160" rx="14" fill="url(#card)" stroke="#2a3147"/>
      <circle cx="36" cy="40" r="20" fill="#3ee9d1" opacity="0.2"/>
      <path d="M24 50 l8 -16 l8 8 l8 -14" stroke="#a3f1e3" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="68" y="46" font-size="18" font-weight="700" fill="#fff">Cross-platform</text>
      <text x="24" y="90"  font-size="13" fill="#8b94ad">Windows, Linux, Android.</text>
      <text x="24" y="108" font-size="13" fill="#8b94ad">macOS builds from source.</text>
      <text x="24" y="138" font-size="12" fill="#3ee9d1">Tauri 2 · React 19</text>
    </g>
  </g>

  <rect x="64" y="496" width="1152" height="2" rx="1" fill="url(#hl)" opacity="0.6"/>
</svg>
